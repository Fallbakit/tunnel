# GoReleaser config for the Fallbakit tunnel agent.
# https://goreleaser.com — run `goreleaser release --clean` from a tagged commit.
version: 2

project_name: fallbakit-agent

before:
  hooks:
    - go mod tidy

builds:
  - id: fallbakit-agent
    main: ./cmd/fallbakit-agent
    binary: fallbakit-agent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.agentVersion={{ .Version }}
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: fallbakit-agent
    name_template: "fallbakit-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: fallbakit
    name: tunnel
